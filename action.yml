name: 'Setup Pkl'
description: 'Setup Pkl by installing, downloading, and adding it to the path.'
author: 'Pkl Community'

branding:
  icon: 'star'
  color: 'green'

inputs:
  pkl-version:
    description: The Pkl version to install.
    required: true
  token:
    description: >-
      Token used to read release metadata for checksum verification. Defaults
      to the workflow's GITHUB_TOKEN.
    default: ${{ github.token }}

runs:
  using: 'node24'
  main: 'dist/index.js'
